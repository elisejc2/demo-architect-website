    <!-- START WORKS -->
    <h2 class="title text-light text-center">Works</h2>
    <button id="list-toggle-button" class="btn listButton btn-outline-light">List View</button>
    <button id="thumbnail-toggle-button" class="btn thumbnailButton btn-outline-light active-toggle">Image View</button>

    <!-- START MODAL -->
    <div id="myModal" class="modal">
        <!-- Modal content -->
        <div class="modal-content">
            <span class="close text-end" onclick="closeModal()">&times;</span>
            <!-- Start Carousel -->
            <div id="carouselExample" class="carousel slide">
                <div class="carousel-inner">
                <div class="carousel-item active">
                    <img class="d-block w-100 modal-carousel-image">
                </div>
                <div class="carousel-item">
                    <img class="d-block w-100 modal-carousel-image">
                </div>
                <div class="carousel-item">
                    <img class="d-block w-100 modal-carousel-image">
                </div>
                <div class="carousel-item">
                    <img class="d-block w-100 modal-carousel-image">
                </div>
                <div class="carousel-item">
                    <img class="d-block w-100 modal-carousel-image">
                </div>
                <div class="carousel-item">
                    <img class="d-block w-100 modal-carousel-image">
                </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
                </button>
            </div>
            <!-- End Carousel -->
        </div>
    </div>
    <!-- END MODAL -->
    <!-- START LIST VIEW -->
    <div class="listView" style="display: none;">
        <ul id="worksList">
            <li><button class="modal-trigger" onclick="openModal('carollCreek')">Caroll Creek Historic District</button></li>

            <li><button class="modal-trigger" onclick="openModal('headquartersVA')">Commerical Headquarters VA</button></li>
            <li><button class="modal-trigger" onclick="openModal('masterplanGreenbelt')">Masterplan Greenbelt MD</button></li>
        </ul>
    </div>
    <!-- END LIST VIEW -->
    <!-- START THUMBNAIL VIEW -->
    <div class="row thumbnailView">
        <div id="column-1" class="column">
            <div class="container-fluid overlay" onclick="openModal('carollCreek')">
                <img class="image" src="buildingImg/WebProjectLowRes/CarollCreek4.jpg" style="width:100%" alt="Caroll Creek Historic District" loading="lazy">
                <div class="middle">
                    <span class="text ">Caroll Creek Historic District</span>
                </div>
            </div>
        </div>
        <div id="column-2" class="column">
            <div class="container-fluid overlay" onclick="openModal('headquartersVA')">
                <img class="image" src="buildingImg/WebProjectLowRes/CommericalHqVa4.jpg" style="width:100%" loading="lazy">
                <div class="middle">
                    <span class="text" >Commerical Headquarters VA</span>
                </div>
            </div>
        </div>  
        <div id="column-3" class="column">
            <div class="container-fluid overlay" onclick="openModal('masterplanGreenbelt')">
                <img class="image" src="buildingImg/WebProjectLowRes/MasterplanGreenbeltMd1.jpg" style="width:100%" loading="lazy">
                <div class="middle">
                    <span class="text">Masterplan Greenbelt MD</span>
                </div>
            </div>
        </div> 
    </div> 
    <!-- END THUMBNAIL VIEW -->
